name: Publish arrow-ml-backend-metal to crates.io

on:
  push:
    tags: ['metal-v*']

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        working-directory: crates/arrow-ml-backend-metal
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
